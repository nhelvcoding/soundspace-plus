<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>soundspace-v2 — Beatmap Maker</title>

  <style>
    /* Upload UI styling */
    #songUploadArea {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.45);
      padding: 12px 16px;
      border-radius: 8px;
      color: white;
      font-family: monospace;
      z-index: 20;
    }

    #songUploadArea input {
      margin-top: 6px;
    }

    #maker-ui {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.45);
      padding: 12px 16px;
      border-radius: 8px;
      color: white;
      font-family: monospace;
      z-index: 20;
    }

    #maker-ui .row {
      margin-bottom: 8px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #maker-ui button {
      background: #111827;
      border: 1px solid #4b5563;
      color: white;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    #maker-ui button:hover {
      border-color: cyan;
    }

    #scrubber {
      width: 400px;
    }
  </style>
  <script type="module" crossorigin src="/assets/maker-DCvV1bAa.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/globals-YMOy_xcw.js">
  <link rel="stylesheet" crossorigin href="/assets/style-C1CBSdqp.css">
</head>

<body>
  <canvas id="gameCanvas"></canvas>


  <div id="songUploadArea">
    <label>Upload Song (MP3):</label><br>
    <input type="file" id="songFileInput" accept="audio/mp3,audio/mpeg" />
    <p id="songUploadStatus"></p>
  </div>
  <label>Upload Beatmap (.beatmap):</label><br>
  <input type="file" id="beatmapFileInput" accept=".beatmap,.json">
<div id="beatmapUploadStatus"></div>



  <audio id="song"></audio>


  <div id="maker-ui">
    <div class="row">
      <button id="playPause">Play / Pause</button>
      <button id="clearNotes">Clear</button>
      <button id="addNote">Add Note @ Center</button>
      <button id="exportMap">Export .beatmap</button>
      <span id="timeLabel">0 ms</span>
    </div>

    <div class="row">
      <input type="range" id="scrubber" min="0" max="1000" value="0" />
    </div>
  </div>

</body>
</html>
